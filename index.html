<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Greeting App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <canvas id="confettiCanvas" class="bg-canvas"></canvas>
      <div id="glowLayer" class="glow-layer"></div>
      <div id="burstLayer" class="burst-layer"></div>
    </div>

    <main class="center">
      <section class="card" aria-label="Greeting form">
        <h1 class="label">Enter Your Name</h1>

        <input
          id="nameInput"
          class="input"
          type="text"
          placeholder="Type your name here"
          autocomplete="name"
        />

        <button id="greetBtn" class="button" type="button">
          Greet
        </button>

        <div id="greeting" class="greeting" aria-live="polite"></div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
